{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block auth_content %}
<style>
  .auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:2rem 1rem;}
  .auth-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:100%;max-width:420px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.08);}
  .auth-head{background:var(--navy);padding:1.5rem 2rem;display:flex;align-items:center;gap:12px;}
  .auth-logo{font-family:var(--display);font-size:1.6rem;color:#fff;letter-spacing:.06em;}
  .auth-logo em{color:#5b9bff;font-style:normal;}
  .auth-body{padding:1.75rem;}
  .auth-title{font-size:16px;font-weight:600;color:var(--text);margin-bottom:.35rem;}
  .auth-sub{font-size:12px;color:var(--text3);margin-bottom:1.25rem;}
  .auth-footer{text-align:center;margin-top:1rem;font-size:12px;color:var(--text3);}
  .auth-footer a{color:var(--blue);text-decoration:none;}
  .remember-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
  .remember-label{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);cursor:pointer;}
</style>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-head">
      <div style="font-size:22px;">🧬</div>
      <div class="auth-logo">Genome<em>Path</em></div>
      <div style="margin-left:auto;font-size:10px;color:rgba(255,255,255,.4);font-family:var(--mono);">v3.0</div>
    </div>
    <div class="auth-body">
      <div class="auth-title">Sign in to your account</div>
      <div class="auth-sub">Clinical DNA Mutation Analysis Platform</div>
      {% if error %}<div class="alert alert-error">⚠ {{ error }}</div>{% endif %}
      <form method="POST">
        <div class="form-group">
          <label class="form-label">Username</label>
          <input class="form-control" type="text" name="username" required autofocus placeholder="Enter your username"/>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-control" type="password" name="password" required placeholder="Enter your password"/>
        </div>
        <div class="remember-row">
          <label class="remember-label">
            <input type="checkbox" name="remember"/> Remember me
          </label>
        </div>
        <button class="btn btn-primary btn-lg w-full" type="submit">Sign In →</button>
      </form>
      <div class="auth-footer">
        Don't have an account? <a href="{{ url_for('register') }}">Register here</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
